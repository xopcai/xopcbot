# Build distributable Electron apps (electron-vite + electron-builder).
# Artifacts: dist/release/* per job (see electron-builder.yml).
#
# If you previously had `.github/workflows/electron.yml` and see two "Electron Build" in Actions,
# the old workflow is orphaned after rename: disable it with:
#   gh api -X PUT repos/<owner>/<repo>/actions/workflows/<old-workflow-id>/disable
#
# Coverage (GitHub-hosted runners):
#   - macOS: Apple Silicon runner builds both Intel (x64) + arm64 in one job
#   - Windows: x64 + arm64 (separate runners)
#   - Linux: x64 (AppImage+deb) + arm64 AppImage only on ubuntu-24.04-arm (deb/fpm on arm64 CI is unreliable).
#
# Triggers:
#   - workflow_dispatch (manual) — builds only; no GitHub Release
#   - git tag push: v* (e.g. v0.2.3) — builds + Release assets when every matrix job succeeds
#
# Private repos: arm64 Linux/Windows runners require available quota on your plan
# (see GitHub docs: “Standard GitHub-hosted runners for private repositories”).
#
# Optional secrets (macOS signing / notarization):
#   - CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
#
# Inspect runs locally (after `gh auth login`):
#   ./scripts/gh-electron-build-runs.sh
#   gh run list --workflow=electron-build.yml --limit 15
#   gh run view <run-id> --log-failed

name: Electron Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# @vscode/ripgrep postinstall uses GITHUB_TOKEN for api.github.com (avoids 403 / rate limits on shared runners).
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: read

concurrency:
  group: electron-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 host → produce Intel + Apple Silicon artifacts (dmg/zip per arch).
          - os: macos-latest
            artifact_name: macos-x64-arm64
            electron_builder_args: '--mac --x64 --arm64'
          - os: windows-latest
            artifact_name: windows-x64
            electron_builder_args: '--win --x64'
          - os: windows-11-arm
            artifact_name: windows-arm64
            electron_builder_args: '--win --arm64'
          - os: ubuntu-latest
            artifact_name: linux-x64
            electron_builder_args: '--linux --x64'
          - os: ubuntu-24.04-arm
            artifact_name: linux-arm64
            electron_builder_args: '--linux appimage --arm64'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project (node + web)
        run: pnpm run build

      - name: Build Electron app
        shell: bash
        env:
          # Avoid hard-link issues on some Windows runners when packaging.
          USE_HARD_LINKS: false
        run: |
          pnpm run electron:vite:build
          # macOS: build architectures sequentially to avoid DMG temp file conflicts
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            echo "Building macOS x64..."
            node scripts/electron-builder.mjs --mac --x64
            echo "Building macOS arm64..."
            node scripts/electron-builder.mjs --mac --arm64
          else
            node scripts/electron-builder.mjs ${{ matrix.electron_builder_args }}
          fi

      - name: Verify artifacts
        shell: bash
        run: |
          echo "Checking build artifacts..."
          if [ ! -d "dist/release" ]; then
            echo "❌ dist/release directory not found!"
            exit 1
          fi
          
          # Count actual artifact files (not directories)
          artifact_count=$(find dist/release -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.zip" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.snap" \) | wc -l)
          if [ "$artifact_count" -eq 0 ]; then
            echo "❌ No installable artifacts found in dist/release!"
            echo "Contents of dist/release:"
            find dist/release -type f
            exit 1
          fi
          
          echo "✅ Found $artifact_count artifact(s):"
          find dist/release -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.zip" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.snap" \)

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xopcbot-electron-${{ matrix.artifact_name }}
          path: dist/release
          if-no-files-found: error
          retention-days: 14

  # Runs only when all `package` matrix jobs succeed. If any platform fails, this job is skipped
  # (no partial GitHub Release).
  release:
    name: Publish GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: xopcbot-electron-*
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/**/*
