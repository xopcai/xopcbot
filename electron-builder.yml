appId: com.xopcai.xopcbot
productName: xopcbot

# Workaround for electron-builder 26.x + pnpm compatibility
npmRebuild: false
nodeGypRebuild: false

# Scoped npm name (@xopcai/xopcbot) would otherwise produce paths like dist/release/@xopcai/*.deb (parent dir missing).
artifactName: ${productName}-${version}-${arch}.${ext}

# Do not auto-publish to GitHub Releases (CI sets CI=true). Artifacts are uploaded via Actions.
# Prevents implicit GH upload + temp .dmg ENOENT when release is missing or multi-arch build overlaps.
publish: null

directories:
  output: dist/release
  # App icons: icon.png (from web/public/logo.svg). electron-builder generates .icns / .ico at package time.
  buildResources: electron/resources

files:
  - out/**/*
  - package.json
  # Gateway UI: `pnpm run build:web` → dist/gateway/static/root (not in esbuild server bundle)
  - dist/gateway/static/root/**/*
  # Built-in skills: bundled SKILL.md files for the agent
  - skills/**/*

extraMetadata:
  main: out/main/index.js

extraResources:
  - from: node_modules/@vscode/ripgrep/bin
    to: bin
    filter:
      - rg
      - rg.exe

mac:
  category: public.app-category.productivity

win:
  target:
    - nsis

# Avoid combined universal NSIS on multi-arch CI (smaller, clearer per-arch installers).
nsis:
  buildUniversalInstaller: false

linux:
  category: Utility
  target:
    - AppImage
    - deb
